<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 搜索助手</title>

    <!-- Google Fonts: 衬线字体 + Inter 无衬线 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ============================================
             Claude 设计系统 - 暖色调 AI 搜索界面
             ============================================ */

        /* 颜色变量 */
        :root {
            --primary: #cc785c;
            --primary-active: #a9583e;
            --primary-disabled: #e6dfd8;
            --ink: #141413;
            --body: #3d3d3a;
            --body-strong: #252523;
            --muted: #6c6a64;
            --muted-soft: #8e8b82;
            --hairline: #e6dfd8;
            --hairline-soft: #ebe6df;
            --canvas: #faf9f5;
            --surface-soft: #f5f0e8;
            --surface-card: #efe9de;
            --surface-dark: #181715;
            --surface-dark-elevated: #252320;
            --on-primary: #ffffff;
            --on-dark: #faf9f5;
            --accent-teal: #5db8a6;
            --success: #5db872;
            --warning: #d4a017;
            --error: #c64545;
        }

        /* 重置基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体布局 - 暖米白画布 */
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--canvas);
            color: var(--body);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.55;
        }

        /* 主容器 - 米白表面 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--surface-soft);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 48px;
        }

        /* 标题样式 - 衬线字体 */
        h1 {
            font-family: "Cormorant Garamond", "Copernicus", serif;
            font-size: 48px;
            font-weight: 400;
            letter-spacing: -0.5px;
            color: var(--ink);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.15;
        }

        /* 输入区域 */
        .input-section {
            margin-bottom: 20px;
        }

        /* 输入框 - 米白画布 + 细边框 */
        textarea {
            width: 100%;
            height: 120px;
            padding: 16px;
            background: var(--canvas);
            border: 1px solid var(--hairline);
            border-radius: 8px;
            font-size: 16px;
            font-family: "Inter", sans-serif;
            color: var(--ink);
            resize: vertical;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(204, 120, 92, 0.15);
        }

        textarea::placeholder {
            color: var(--muted-soft);
        }

        /* 搜索按钮 - 珊瑚橙主按钮 */
        .search-btn {
            width: 100%;
            padding: 16px 24px;
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            font-family: "Inter", sans-serif;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.15s;
        }

        .search-btn:hover {
            background: var(--primary-active);
        }

        .search-btn:active {
            transform: scale(0.98);
        }

        .search-btn:disabled {
            background: var(--primary-disabled);
            cursor: not-allowed;
            transform: none;
        }

        /* 状态显示区域 - 卡片表面 */
        .status-section {
            background: var(--surface-card);
            border-radius: 12px;
            padding: 16px 20px;
            margin-top: 24px;
            display: none;
        }

        .status-text {
            color: var(--body);
            font-size: 15px;
            text-align: center;
        }

        /* 结果展示区域 */
        .result-section {
            display: none;
            margin-top: 32px;
        }

        .result-title {
            font-family: "Cormorant Garamond", serif;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.3px;
            color: var(--ink);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--hairline);
        }

        .result-content {
            color: var(--body);
            line-height: 1.75;
        }

        /* Markdown 格式样式 - Claude 风格 */
        .result-content h1,
        .result-content h2,
        .result-content h3 {
            font-family: "Cormorant Garamond", serif;
            font-weight: 400;
            margin-top: 28px;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .result-content h1 {
            font-size: 36px;
            letter-spacing: -0.5px;
        }

        .result-content h2 {
            font-size: 28px;
            letter-spacing: -0.3px;
        }

        .result-content h3 {
            font-size: 22px;
            letter-spacing: -0.2px;
        }

        .result-content p {
            margin-bottom: 16px;
        }

        .result-content ul,
        .result-content ol {
            margin-left: 24px;
            margin-bottom: 16px;
        }

        .result-content li {
            margin-bottom: 8px;
        }

        .result-content strong {
            font-weight: 500;
            color: var(--body-strong);
        }

        .result-content code {
            background: var(--surface-dark);
            color: var(--on-dark);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: "SF Mono", "Menlo", monospace;
            font-size: 14px;
        }

        .result-content a {
            color: var(--primary);
            text-decoration: none;
        }

        .result-content a:hover {
            text-decoration: underline;
        }

        /* 加载动画 - 珊瑚橙 */
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--surface-card);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 24px;
            }

            h1 {
                font-size: 32px;
            }

            .result-title {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 页面标题 - 衬线字体 -->
        <h1>AI 搜索助手</h1>

        <!-- 输入区域 -->
        <div class="input-section">
            <textarea
                id="queryInput"
                placeholder="请输入你想了解的问题，比如：&#10;• 大模型预训练和推理一体化的研究现状&#10;• 2025年考研英语阅读技巧&#10;• Python Flask 和 FastAPI 的对比"
            ></textarea>
        </div>

        <!-- 搜索按钮 - 珊瑚橙 -->
        <button class="search-btn" id="searchBtn" onclick="doSearch()">
            开始搜索
        </button>

        <!-- 状态显示区域 -->
        <div class="status-section" id="statusSection">
            <p class="status-text" id="statusText">
                <span class="loading"></span>
                正在搜索中...
            </p>
        </div>

        <!-- 结果展示区域 -->
        <div class="result-section" id="resultSection">
            <h2 class="result-title">研究报告</h2>
            <div class="result-content" id="resultContent"></div>
        </div>
    </div>

    <script>
        /**
         * 执行搜索的函数
         * 当用户点击"开始搜索"按钮时触发
         */
        async function doSearch() {
            // 获取用户输入
            const queryInput = document.getElementById('queryInput');
            const query = queryInput.value.trim();

            // 如果没有输入，提示用户
            if (!query) {
                alert('请输入搜索问题');
                return;
            }

            // 获取页面元素
            const searchBtn = document.getElementById('searchBtn');
            const statusSection = document.getElementById('statusSection');
            const statusText = document.getElementById('statusText');
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');

            // 重置页面状态
            resultSection.style.display = 'none';
            resultContent.innerHTML = '';
            statusSection.style.display = 'block';
            statusText.innerHTML = '<span class="loading"></span> 正在分析问题并生成关键词...';
            searchBtn.disabled = true;
            searchBtn.textContent = '搜索中...';

            try {
                // 发送搜索请求到后端
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: query })
                });

                // 解析返回的数据
                const data = await response.json();

                // 如果有错误，显示错误信息
                if (data.error) {
                    statusText.innerHTML = '<span style="color: var(--error);">' + data.error + '</span>';
                    return;
                }

                // 显示搜索结果
                statusText.innerHTML = '搜索完成！共进行 ' + data.search_rounds + ' 轮搜索，找到 ' + data.total_results + ' 条相关结果';

                // 渲染报告（简单的 Markdown 转换）
                resultContent.innerHTML = renderMarkdown(data.report);
                resultSection.style.display = 'block';

            } catch (error) {
                // 如果出错，显示错误信息
                console.error('搜索失败:', error);
                statusText.innerHTML = '<span style="color: var(--error);">搜索失败，请检查网络连接或稍后重试</span>';
            } finally {
                // 恢复按钮状态
                searchBtn.disabled = false;
                searchBtn.textContent = '开始搜索';
            }
        }

        /**
         * 简单的 Markdown 渲染函数
         * 把 Markdown 格式转换为 HTML
         */
        function renderMarkdown(text) {
            // 简单的 Markdown 转换规则
            let html = text
                // 代码块（在行内代码之前处理）
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                // 标题
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                // 粗体
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // 斜体
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                // 链接
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                // 行内代码
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // 换行
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            return '<p>' + html + '</p>';
        }

        /**
         * 允许按 Ctrl+Enter 或 Cmd+Enter 提交搜索
         */
        document.getElementById('queryInput').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                doSearch();
            }
        });
    </script>
</body>
</html>
